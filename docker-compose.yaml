version: "3.9"

services:
  db:
    build: ./database
    container_name: tasklite-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  backend:
    build: ./backend
    container_name: tasklite-api
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - backend-net
      - frontend-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    build: ./frontend
    container_name: tasklite-ui
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

networks:
  frontend-net:
  backend-net:

volumes:
  db_data:
