<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TaskLite</title>
</head>
<body>
    <h1>Lista Zadań</h1>
    <input type="text" id="taskInput" placeholder="Nowe zadanie...">
    <button onclick="addTask()">Dodaj</button>
    <ul id="taskList"></ul>

    <script>
        const API = "http://localhost:8000"; // Adres backendu wystawiony przez Docker

        async function loadTasks() {
            const res = await fetch(`${API}/tasks`);
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map(t => `
                <li>
                    <span style="${t.is_done ? 'text-decoration:line-through' : ''}">${t.title}</span>
                    <button onclick="toggleTask(${t.id})">${t.is_done ? 'Cofnij' : 'Gotowe'}</button>
                    <button onclick="deleteTask(${t.id})">Usuń</button>
                </li>
            `).join('');
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            await fetch(`${API}/tasks?title=${input.value}`, { method: 'POST' });
            input.value = '';
            loadTasks();
        }

        async function toggleTask(id) {
            await fetch(`${API}/tasks/${id}`, { method: 'PATCH' });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
